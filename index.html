<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMaster | Local Services</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff88; /* Verde neón: color de dinero y servicios */
            --card-bg: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            margin-top: 50px;
        }

        .badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 15px 0 5px 0;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }

        .input-group {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 16px;
            display: flex;
            max-width: 500px;
            margin: 0 auto 50px auto;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 20px;
            flex: 1;
            outline: none;
            font-size: 1rem;
        }

        .btn-main {
            background: var(--accent);
            border: none;
            color: black;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            transition: 0.3s;
            position: relative;
        }

        .service-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .price {
            position: absolute;
            top: 25px;
            right: 25px;
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .category {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .contact-btn {
            display: block;
            text-align: center;
            background: #111;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--accent);
            color: black;
        }

        footer {
            margin-top: auto;
            padding: 40px;
            color: #333;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">DISPONIBLE EN TU CIUDAD</span>
        <h1>LocalServices</h1>
        <p class="subtitle">Micro-servicios digitales rápidos y garantizados.</p>

        <div class="input-group">
            <input type="text" id="searchInput" placeholder="¿Qué servicio buscas?" onkeyup="filterServices()">
            <button class="btn-main">BUSCAR</button>
        </div>

        <div class="grid" id="servicesGrid">
            </div>
    </div>

    <footer>
        PLATAFORMA LOCAL © 2026 // BY MARLON DEV
    </footer>

    <script>
        const services = [
            { cat: "Soporte", title: "Instalación de Windows", price: "$30k", desc: "Formateo e instalación de Windows 10/11 con drivers básicos." },
            { cat: "Soporte", title: "Limpieza de Virus", price: "$15k", desc: "Optimización de PC lenta y eliminación de malware/anuncios." },
            { cat: "Educación", title: "Clases de Excel", price: "$20k/h", desc: "Aprende fórmulas, tablas dinámicas y gráficos desde cero." },
            { cat: "Diseño", title: "Tareas en PowerPoint", price: "$10k", desc: "Diseño de diapositivas profesionales para exposiciones." },
            { cat: "Redes", title: "Configuración WiFi", price: "$15k", desc: "Configuración de routers, cambio de clave y mejora de señal." },
            { cat: "Multimedia", title: "Edición de Video Corto", price: "$25k", desc: "Edición de Reels o TikToks con subtítulos y música." }
        ];

        function displayServices(filter = "") {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = "";
            
            const filtered = services.filter(s => 
                s.title.toLowerCase().includes(filter.toLowerCase()) || 
                s.cat.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(s => {
                grid.innerHTML += `
                    <div class="service-card">
                        <span class="category">${s.cat}</span>
                        <div class="price">${s.price}</div>
                        <div class="title">${s.title}</div>
                        <div class="desc">${s.desc}</div>
                        <a href="https://wa.me/TUNUMERO" class="contact-btn">CONTRATAR AHORA</a>
                    </div>
                `;
            });
        }

        function filterServices() {
            const val = document.getElementById('searchInput').value;
            displayServices(val);
        }

        // Carga inicial
        displayServices();
    </script>
</body>
</html>
