<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMaster | Focus Terminal</title>
    <style>
        :root {
            --accent: #ff3e3e; /* Rojo neón para urgencia y enfoque */
            --bg: #0a0a0a;
            --surface: #111111;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace; /* Estilo terminal */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .terminal-header {
            text-align: left;
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
            margin: 20px 0;
        }

        .controls button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .controls button:hover {
            background: var(--accent);
            color: black;
        }

        .task-section {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        input {
            width: 70%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            color: white;
            padding: 10px;
            outline: none;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.9rem;
        }

        .done { text-decoration: line-through; color: #555; }

        footer {
            margin-top: auto;
            font-size: 0.7rem;
            color: #444;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>> SYSTEM: ONLINE</div>
        <div>> USER: MARLON_DEV</div>
        <div style="color: var(--accent)">> STATUS: FOCUS_MODE_ACTIVE</div>
    </div>

    <div class="timer-display" id="timer">25:00</div>

    <div class="controls">
        <button onclick="toggleTimer()">START / STOP</button>
        <button onclick="resetTimer()">RESET</button>
    </div>

    <div class="task-section">
        <div style="margin-bottom: 15px;">// PRIORIDADES_DEL_DÍA</div>
        <input type="text" id="taskInput" placeholder="Añadir objetivo...">
        <button onclick="addTask()" style="width: 25%; padding: 10px;">+</button>
        <ul class="task-list" id="taskList"></ul>
    </div>

    <footer>
        PATHMASTER TERMINAL v2.0 // NO DISTRACTIONS ALLOWED
    </footer>

    <script>
        // Lógica del Temporizador (Pomodoro)
        let timeLeft = 25 * 60;
        let timerId = null;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            } else {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateDisplay();
        }

        // Lógica de Tareas
        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === "") return;

            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <span onclick="this.classList.toggle('done')">${input.value}</span>
                <span onclick="this.parentElement.remove()" style="cursor:pointer; color:red">X</span>
            `;
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
