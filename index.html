<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMaster AI</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --card: #1a1a1a; --text: #ffffff; }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }
        header { padding: 30px; text-align: center; }
        h1 { font-size: 2.2rem; color: var(--primary); margin: 0; }
        .search-container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333;
            background: var(--card); color: white; text-align: center; box-sizing: border-box;
        }
        button {
            width: 100%; background: var(--primary); color: black; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        main { flex: 1; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .step-item { padding: 10px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #444; }
    </style>
</head>
<body>

    <header>
        <h1>PathMaster AI</h1>
        <p style="color:#666">Rutas de aprendizaje para lo que necesites</p>
        <div class="search-container">
            <input type="text" id="userGoal" placeholder="Ej: cocina, mecanica, algoritmos...">
            <button onclick="generatePath()">Generar Ruta</button>
        </div>
    </header>

    <main id="displayArea">
        <div class="card">
            <h3>¿Qué quieres aprender hoy?</h3>
            <p>Escribe cualquier tema y te daré los pasos para empezar.</p>
        </div>
    </main>

    <footer>&copy; 2026 PathMaster Global | Marlon Dev</footer>

    <script>
        const database = {
            "cocina": { title: "Maestro Culinario", steps: ["Seguridad y cortes de cuchillo", "Técnicas de calor (herbir, freír, asar)", "Salsas madre y condimentos", "Emplatado y sabores"] },
            "mecanica": { title: "Mecánica Automotriz", steps: ["Herramientas y seguridad", "Funcionamiento del motor", "Sistemas de frenos y suspensión", "Diagnóstico por computadora"] },
            "electronica": { title: "Ingeniería Electrónica", steps: ["Componentes básicos (resistencias, leds)", "Leyes de Ohm y Kirchhoff", "Soldadura y circuitos impresos", "Microcontroladores (Arduino)"] },
            "ejercicio": { title: "Entrenamiento Físico", steps: ["Evaluación de movilidad", "Rutina de fuerza básica", "Plan de nutrición", "Periodización y descanso"] },
            "deporte": { title: "Atleta de Alto Nivel", steps: ["Fundamentos técnicos", "Resistencia cardiovascular", "Psicología deportiva", "Estrategia de juego"] },
            "algoritmo": { title: "Pensamiento Lógico", steps: ["Variables y tipos de datos", "Estructuras de control (If, For)", "Complejidad O(n)", "Estructuras de datos avanzadas"] },
            "marketing": { title: "Marketing Digital", steps: ["Análisis de audiencia", "Creación de contenido", "Publicidad pagada", "Métricas y optimización"] }
        };

        function generatePath() {
            const input = document.getElementById('userGoal').value.toLowerCase().trim();
            const display = document.getElementById('displayArea');
            
            // Si el tema está en la base de datos
            if (database[input]) {
                const data = database[input];
                let stepsHtml = data.steps.map(s => `<div class="step-item">→ ${s}</div>`).join('');
                display.innerHTML = `<div class="card"><h2 style="color:var(--primary)">${data.title}</h2>${stepsHtml}</div>`;
            } 
            // Si el tema NO está, damos una ruta universal de aprendizaje
            else {
                display.innerHTML = `
                    <div class="card">
                        <h2 style="color:var(--primary)">Ruta para: ${input}</h2>
                        <div class="step-item">1. Buscar los fundamentos básicos en YouTube/Google.</div>
                        <div class="step-item">2. Conseguir las herramientas o materiales mínimos.</div>
                        <div class="step-item">3. Practicar la técnica básica por 20 horas.</div>
                        <div class="step-item">4. Enseñar a alguien más lo aprendido para reforzar.</div>
                        <p style="font-size:0.8rem; color:#666; margin-top:15px;">Este es un plan general para temas nuevos.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
