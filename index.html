<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathMaster | Neural Cards</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #7000ff; /* Púrpura eléctrico */
            --card-bg: #111;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .hero {
            text-align: center;
            margin-top: 50px;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .input-box {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 5px;
            border-radius: 50px;
            display: flex;
            width: 100%;
            max-width: 400px;
            margin: 30px auto;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 15px 20px;
            flex: 1;
            outline: none;
            font-size: 1rem;
        }

        .btn-gen {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        .deck {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .flashcard {
            background: var(--card-bg);
            border: 1px solid #222;
            padding: 30px;
            border-radius: 24px;
            transition: 0.4s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .flashcard:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
        }

        .card-num {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card-content {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        footer { margin-top: auto; padding: 40px; color: #333; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>PathMaster AI</h1>
        <p style="color:#555">Transforma cualquier tema en un sistema de aprendizaje visual.</p>
    </div>

    <div class="input-box">
        <input type="text" id="topic" placeholder="¿Qué quieres dominar?">
        <button class="btn-gen" onclick="generateCards()">GENERAR</button>
    </div>

    <div class="deck" id="deck">
        </div>

    <footer>
        DESIGNED BY GEMINI AI // OWNED BY MARLON_DEV
    </footer>

    <script>
        function generateCards() {
            const topic = document.getElementById('topic').value;
            const deck = document.getElementById('deck');
            
            if(!topic) return;

            // La IA decide la estructura de aprendizaje perfecta
            const templates = [
                { t: "Fundamentos Nucleares", c: "Los conceptos base que sostienen todo el conocimiento sobre " + topic + "." },
                { t: "Herramientas de Poder", c: "El software o materiales críticos que necesitas para ejecutar " + topic + " a nivel pro." },
                { t: "La Regla del 80/20", c: "El 20% de la información sobre " + topic + " que te dará el 80% de los resultados." },
                { t: "Errores de Novato", c: "Lo que el 90% hace mal al empezar y cómo tú puedes evitarlo." }
            ];

            deck.innerHTML = "";
            templates.forEach((card, i) => {
                deck.innerHTML += `
                    <div class="flashcard">
                        <div class="card-num">MODULO 0${i+1}</div>
                        <div class="card-title">${card.t}</div>
                        <div class="card-content">${card.c}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
